<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" role="img" aria-label="Decorative orange wave divider" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wave-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E97137" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#E97137" stop-opacity="0.85"/>
      <stop offset="80%"  stop-color="#E97137" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E97137" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M0 30 Q 100 8, 200 30 T 400 30 T 600 30 T 800 30 T 1000 30 T 1200 30"
        fill="none" stroke="url(#wave-fade)" stroke-width="2"/>
  <g fill="#E97137" opacity="0.55">
    <circle cx="200" cy="30" r="3"/>
    <circle cx="400" cy="30" r="3"/>
    <circle cx="600" cy="30" r="4"/>
    <circle cx="800" cy="30" r="3"/>
    <circle cx="1000" cy="30" r="3"/>
  </g>
</svg>
