<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" role="img" aria-labelledby="pr-t pr-d">
  <title id="pr-t">Survey of fifteen Ontario marketing practitioners — three findings</title>
  <desc id="pr-d">A clean editorial bar chart. Three horizontal orange bars show the share of practitioners who said: 73 percent cannot explain digital twins, 60 percent name cost as the top adoption barrier, 80 percent prefer an interactive demonstration over written explainers.</desc>

  <defs>
    <style>
      .t-mono   { font-family: "JetBrains Mono", ui-monospace, monospace; }
      .t-sans   { font-family: "Inter", -apple-system, system-ui, sans-serif; }
      .t-eyebrow{ font-size: 11px; letter-spacing: 0.16em; fill: #B85522; font-weight: 600; }
      .t-qtag   { font-size: 10px; letter-spacing: 0.18em; fill: #7A7A7A; font-weight: 500; }
      .t-stmt   { font-size: 14px; fill: #1A1A1A; }
      .t-stmt b { font-weight: 600; }
      .t-stmt .dim { fill: #7A7A7A; }
      .t-pct    { font-size: 22px; font-weight: 800; fill: #1A1A1A; letter-spacing: -0.02em; font-feature-settings: "tnum"; }
      .t-meta   { font-size: 11px; fill: #7A7A7A; }
      .track    { fill: #FFFFFF; stroke: #E5E5E5; stroke-width: 1; }
      .fill     { fill: #E97137; }
    </style>
  </defs>

  <!-- ============ TITLE BLOCK ============ -->
  <g>
    <text x="40" y="44" class="t-mono t-eyebrow">PRIMARY SURVEY · N = 15</text>
    <text x="40" y="76" class="t-sans" font-size="20" font-weight="700" fill="#1A1A1A">Three findings, consistent across every response.</text>
    <text x="40" y="100" class="t-sans t-meta">Ontario · March – April 2026 · structured instrument · all fifteen completed.</text>
  </g>

  <!-- thin separator -->
  <line x1="40" y1="120" x2="840" y2="120" stroke="#E5E5E5" stroke-width="1"/>

  <!-- ============ BAR 1 — Q4 awareness 73% ============ -->
  <!--   row y-baseline = 160  -->
  <g transform="translate(40,142)">
    <text x="0"   y="0"  class="t-mono t-qtag">Q4 · AWARENESS</text>
    <text x="0"   y="22" class="t-sans t-stmt"><tspan font-weight="600">Cannot explain</tspan> <tspan class="dim">what a digital twin does</tspan></text>
    <!-- bar -->
    <rect x="0"   y="34" width="660" height="14" rx="1" class="track"/>
    <rect x="0"   y="34" width="481.8" height="14" rx="1" class="fill"/>
    <!-- value -->
    <text x="680" y="46" class="t-sans t-pct">73%</text>
    <!-- baseline tick (n=11/15) -->
    <text x="0"   y="62" class="t-mono t-meta">n ≈ 11 / 15</text>
  </g>

  <!-- ============ BAR 2 — Q6 cost barrier 60% ============ -->
  <g transform="translate(40,224)">
    <text x="0"   y="0"  class="t-mono t-qtag">Q6 · TOP ADOPTION BARRIER</text>
    <text x="0"   y="22" class="t-sans t-stmt"><tspan font-weight="600">Cost of implementation</tspan> <tspan class="dim">is the #1 blocker</tspan></text>
    <rect x="0"   y="34" width="660" height="14" rx="1" class="track"/>
    <rect x="0"   y="34" width="396"   height="14" rx="1" class="fill"/>
    <text x="680" y="46" class="t-sans t-pct">60%</text>
    <text x="0"   y="62" class="t-mono t-meta">n = 9 / 15</text>
  </g>

  <!-- ============ BAR 3 — Q8 demo preferred 80% ============ -->
  <g transform="translate(40,306)">
    <text x="0"   y="0"  class="t-mono t-qtag">Q8 · FORMAT PREFERENCE</text>
    <text x="0"   y="22" class="t-sans t-stmt"><tspan font-weight="600">Prefers an interactive demo</tspan> <tspan class="dim">over written explainers</tspan></text>
    <rect x="0"   y="34" width="660" height="14" rx="1" class="track"/>
    <rect x="0"   y="34" width="528"   height="14" rx="1" class="fill"/>
    <text x="680" y="46" class="t-sans t-pct">80%</text>
    <text x="0"   y="62" class="t-mono t-meta">n = 12 / 15</text>
  </g>

  <!-- bottom anchor: scale + caveat -->
  <line x1="40"  y1="0" x2="40"  y2="0" stroke="none"/>
  <g transform="translate(40,372)">
    <text x="0" y="0" class="t-mono t-meta" letter-spacing="0.06em" fill="#7A7A7A">0%</text>
    <text x="660" y="0" class="t-mono t-meta" letter-spacing="0.06em" fill="#7A7A7A" text-anchor="end">100%</text>
  </g>
</svg>
