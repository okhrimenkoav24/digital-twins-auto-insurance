<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="df-title df-desc">
  <title id="df-title">From driver to personalized policy</title>
  <desc id="df-desc">A schematic flow: a real driver in a car at left, sending telematics signals to a digital twin, which feeds personalized pricing and messaging back to the customer.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E97137"/>
    </marker>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E97137" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#E97137" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E97137" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background grid (very faint) -->
  <g opacity="0.06" stroke="#1A1A1A" stroke-width="1">
    <line x1="0" y1="80"  x2="720" y2="80"/>
    <line x1="0" y1="160" x2="720" y2="160"/>
    <line x1="0" y1="240" x2="720" y2="240"/>
  </g>

  <!-- ============ NODE 1: Real driver / car ============ -->
  <g transform="translate(90,160)">
    <circle r="56" fill="#FCE6D9" stroke="#E97137" stroke-width="2"/>
    <!-- car silhouette -->
    <g transform="translate(-28,-12)" fill="#1A1A1A">
      <path d="M4 18 L8 8 C10 5 14 4 18 4 L38 4 C42 4 46 5 48 8 L52 18 L52 24 C52 25 51 26 50 26 L46 26 C46 27 45 28 44 28 L40 28 C39 28 38 27 38 26 L18 26 C18 27 17 28 16 28 L12 28 C11 28 10 27 10 26 L6 26 C5 26 4 25 4 24 z"/>
      <circle cx="14" cy="22" r="2.5" fill="#fff"/>
      <circle cx="42" cy="22" r="2.5" fill="#fff"/>
    </g>
    <text x="0" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Real driver</text>
    <text x="0" y="110" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A7A7A">customer.id</text>
  </g>

  <!-- arrow + label: signals -->
  <g>
    <line x1="160" y1="160" x2="280" y2="160"
          stroke="url(#trail)" stroke-width="3" stroke-dasharray="6 4"
          marker-end="url(#arrow)"/>
    <text x="220" y="148" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#B85522" letter-spacing="0.1em">SIGNALS →</text>
    <text x="220" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A7A7A">telematics · claims · prefs</text>
  </g>

  <!-- ============ NODE 2: Digital twin ============ -->
  <g transform="translate(360,160)">
    <!-- outer ring with data points -->
    <circle r="70" fill="none" stroke="#E97137" stroke-width="1.5" stroke-dasharray="3 4"/>
    <!-- scattered data points -->
    <g fill="#E97137">
      <circle cx="-40" cy="-30" r="3"/>
      <circle cx="20"  cy="-48" r="3"/>
      <circle cx="48"  cy="-12" r="3"/>
      <circle cx="40"  cy="32"  r="3"/>
      <circle cx="-10" cy="50"  r="3"/>
      <circle cx="-50" cy="14"  r="3"/>
      <circle cx="8"   cy="-8"  r="3"/>
      <circle cx="-20" cy="18"  r="3"/>
    </g>
    <!-- connecting lines (network feel) -->
    <g stroke="#E97137" stroke-width="0.8" stroke-opacity="0.5">
      <line x1="-40" y1="-30" x2="8"   y2="-8"/>
      <line x1="20"  y1="-48" x2="8"   y2="-8"/>
      <line x1="48"  y1="-12" x2="8"   y2="-8"/>
      <line x1="40"  y1="32"  x2="8"   y2="-8"/>
      <line x1="-10" y1="50"  x2="-20" y2="18"/>
      <line x1="-50" y1="14"  x2="-20" y2="18"/>
      <line x1="8"   y1="-8"  x2="-20" y2="18"/>
    </g>
    <!-- core -->
    <circle r="20" fill="#E97137"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#fff">TWIN</text>
    <text x="0" y="108" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Digital twin</text>
    <text x="0" y="126" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A7A7A">model.simulate()</text>
  </g>

  <!-- arrow + label: personalized output -->
  <g>
    <line x1="440" y1="160" x2="560" y2="160"
          stroke="url(#trail)" stroke-width="3" stroke-dasharray="6 4"
          marker-end="url(#arrow)"/>
    <text x="500" y="148" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#B85522" letter-spacing="0.1em">← PERSONALIZED</text>
    <text x="500" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A7A7A">price · coverage · message</text>
  </g>

  <!-- ============ NODE 3: Personalized policy / offer ============ -->
  <g transform="translate(630,160)">
    <rect x="-44" y="-50" width="88" height="100" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- header band -->
    <rect x="-44" y="-50" width="88" height="18" rx="6" fill="#E97137"/>
    <rect x="-44" y="-38" width="88" height="6" fill="#E97137"/>
    <text x="0" y="-37" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.12em">OFFER</text>
    <!-- price line -->
    <text x="0" y="-12" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#1A1A1A">$ 142</text>
    <text x="0" y="2"   text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7A7A7A">/ month</text>
    <!-- detail lines -->
    <rect x="-32" y="14" width="64" height="3" rx="1" fill="#E5E5E5"/>
    <rect x="-32" y="22" width="48" height="3" rx="1" fill="#E5E5E5"/>
    <rect x="-32" y="30" width="56" height="3" rx="1" fill="#E5E5E5"/>
    <!-- accept pill -->
    <rect x="-26" y="38" width="52" height="10" rx="5" fill="#FCE6D9"/>
    <text x="0" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" font-weight="700" fill="#B85522" letter-spacing="0.1em">ACCEPT</text>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Tailored policy</text>
    <text x="0" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A7A7A">offer.render()</text>
  </g>

  <!-- ============ Feedback loop arc ============ -->
  <path d="M 630 100 Q 360 30 90 100"
        fill="none" stroke="#B85522" stroke-width="1.4" stroke-dasharray="4 5"
        marker-end="url(#arrow)" opacity="0.7"/>
  <text x="360" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#B85522" letter-spacing="0.08em">FEEDBACK · refines model</text>
</svg>
